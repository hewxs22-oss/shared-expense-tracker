<text x="498" y="858" font-size="12" fill="#333" transform="rotate(0.4, 498, 858)">Latte factor: small recurring costs</text>
<text x="498" y="874" font-size="12" fill="#333">compound into large annual totals.</text>

<text x="910" y="858" font-size="10" font-style="italic" fill="#b09060" text-anchor="end" transform="rotate(1.5, 910, 858)">e.g. $5/day = $1,825/yr</text>
