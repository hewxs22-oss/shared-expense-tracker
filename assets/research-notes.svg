<text x="498" y="900" font-size="12" fill="#333">SAAM: 21-item state attachment measure.</text>
<text x="510" y="914" font-size="10" font-style="italic" fill="#888">captures mood-level security, not just trait</text>

<text x="498" y="938" font-size="12" fill="#333">KMSI-R: money scripts (avoidance,</text>
<text x="498" y="952" font-size="12" fill="#333">worship, status, vigilance).</text>
<text x="510" y="966" font-size="10" font-style="italic" fill="#888">explains why partners fight about the same $20</text>

<text x="498" y="990" font-size="12" fill="#333">Life-cycle: spending peaks mid-life,</text>
<text x="498" y="1004" font-size="12" fill="#333">saving is smoothing consumption over time.</text>

