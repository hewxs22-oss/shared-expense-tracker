<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1120">
<defs>

  <!-- ink line wobble — strong -->
  <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="turbulence" baseFrequency="0.018 0.06" numOctaves="3" seed="12" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- text hand-wobble — very subtle -->
  <filter id="tw" x="-2%" y="-10%" width="104%" height="120%">
    <feTurbulence type="turbulence" baseFrequency="0.05 0.03" numOctaves="2" seed="4" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- highlighter smear -->
  <filter id="hl" x="-3%" y="-20%" width="106%" height="140%">
    <feGaussianBlur stdDeviation="2 4"/>
  </filter>

  <!-- pencil circle wobble -->
  <filter id="circle" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="turbulence" baseFrequency="0.03 0.05" numOctaves="2" seed="9" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- notebook ruled lines -->
  <pattern id="ruled" x="0" y="0" width="960" height="28" patternUnits="userSpaceOnUse">
    <line x1="0" y1="27.5" x2="960" y2="27.5" stroke="#b8cfe0" stroke-width="0.5" opacity="0.4"/>
  </pattern>

  <style>
    text { font-family: Georgia, 'Times New Roman', serif; }
  </style>
</defs>

<!-- ═══ PAGE ═══ -->
<rect width="960" height="1120" fill="#f6f1e6"/>
<rect width="960" height="1120" fill="url(#ruled)"/>

<!-- warm edge shadow -->
<rect width="960" height="1120" fill="none" stroke="#c8b88a" stroke-width="3" opacity="0.3"/>

<!-- red margin line -->
<line x1="82" y1="0" x2="82" y2="1060" stroke="#d97070" stroke-width="1.1" opacity="0.55" filter="url(#ink)"/>

<!-- spiral binding holes -->
<circle cx="42" cy="110"  r="7" fill="none" stroke="#bbb" stroke-width="1.2" opacity="0.5"/>
<circle cx="42" cy="230" r="7" fill="none" stroke="#bbb" stroke-width="1.2" opacity="0.5"/>
