<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
<defs>
  <filter id="f">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" seed="9" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs>

<rect width="800" height="360" fill="#faf8f2"/>

<text x="400" y="38" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#1a1a1a">Three System Modes</text>
<text x="400" y="57" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#888" font-style="italic">bot behavior adapts to your attachment style</text>

<!-- Mode A -->
<rect x="30" y="74" width="220" height="250" rx="6" fill="#fff" stroke="#333" stroke-width="2" filter="url(#f)"/>
<rect x="30" y="74" width="220" height="44" rx="6" fill="#dbeafe" stroke="#333" stroke-width="2" filter="url(#f)"/>
<text x="140" y="93" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#1e3a5f">A · Standard</text>
<text x="140" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#4a6fa5" font-style="italic">secure attachment</text>

<text x="50" y="140" font-family="Georgia,serif" font-size="12" fill="#333">✓  brief confirmation</text>
<text x="50" y="162" font-family="Georgia,serif" font-size="12" fill="#333">✓  90% budget warning</text>
<text x="50" y="184" font-family="Georgia,serif" font-size="12" fill="#333">✓  monthly report</text>
<text x="50" y="206" font-family="Georgia,serif" font-size="12" fill="#aaa">—  no balance shown</text>
<text x="50" y="228" font-family="Georgia,serif" font-size="12" fill="#aaa">—  no mid-month check</text>

<text x="140" y="295" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#888" font-style="italic">low anxiety · low avoidance</text>
<text x="50" y="316" font-family="Georgia,serif" font-size="11" fill="#555">reply in chat:</text>
<text x="140" y="316" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#1e3a5f">mode A</text>

<!-- Mode B -->
<rect x="290" y="74" width="220" height="250" rx="6" fill="#fff" stroke="#333" stroke-width="2" filter="url(#f)"/>
<rect x="290" y="74" width="220" height="44" rx="6" fill="#fef9c3" stroke="#333" stroke-width="2" filter="url(#f)"/>
<text x="400" y="93" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#713f12">B · Reassurance</text>
<text x="400" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#92400e" font-style="italic">anxious attachment</text>

<text x="310" y="140" font-family="Georgia,serif" font-size="12" fill="#333">✓  confirmation + balance</text>
<text x="310" y="162" font-family="Georgia,serif" font-size="12" fill="#333">✓  70% budget warning</text>
<text x="310" y="184" font-family="Georgia,serif" font-size="12" fill="#333">✓  monthly report</text>
<text x="310" y="206" font-family="Georgia,serif" font-size="12" fill="#333">✓  mid-month check-in</text>
<text x="310" y="228" font-family="Georgia,serif" font-size="12" fill="#aaa">—  more frequent updates</text>

<text x="400" y="295" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#888" font-style="italic">high anxiety · low avoidance</text>
<text x="310" y="316" font-family="Georgia,serif" font-size="11" fill="#555">reply in chat:</text>
<text x="400" y="316" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#713f12">mode B</text>

<!-- Mode C -->
<rect x="550" y="74" width="220" height="250" rx="6" fill="#fff" stroke="#333" stroke-width="2" filter="url(#f)"/>
<rect x="550" y="74" width="220" height="44" rx="6" fill="#f3f4f6" stroke="#333" stroke-width="2" filter="url(#f)"/>
<text x="660" y="93" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#1f2937">C · Silent</text>
<text x="660" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#6b7280" font-style="italic">avoidant attachment</text>

<text x="570" y="140" font-family="Georgia,serif" font-size="12" fill="#333">✓  records silently</text>
<text x="570" y="162" font-family="Georgia,serif" font-size="12" fill="#333">✓  monthly report only</text>
<text x="570" y="184" font-family="Georgia,serif" font-size="12" fill="#aaa">—  no reply on expense</text>
<text x="570" y="206" font-family="Georgia,serif" font-size="12" fill="#aaa">—  no balance shown</text>
<text x="570" y="228" font-family="Georgia,serif" font-size="12" fill="#aaa">—  no warnings</text>

<text x="660" y="295" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#888" font-style="italic">low anxiety · high avoidance</text>
<text x="570" y="316" font-family="Georgia,serif" font-size="11" fill="#555">reply in chat:</text>
<text x="660" y="316" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#1f2937">mode C</text>

<!-- watermark -->
<text x="790" y="355" text-anchor="end" font-family="Georgia,serif" font-size="10" fill="#ccc">github.com/hewxs22-oss</text>
</svg>
